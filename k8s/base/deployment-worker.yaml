apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: consumer
    spec:
      serviceAccountName: worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: 164083713732.dkr.ecr.us-west-1.amazonaws.com/study-platform-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: database-url
                  optional: true
          # Stub until an SQS consumer management command exists (see QUICKSTART.md).
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "worker stub running — replace command with SQS consumer"
              exec sleep infinity
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
