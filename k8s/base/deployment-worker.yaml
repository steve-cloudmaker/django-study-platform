apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: consumer
    spec:
      serviceAccountName: worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          # Same image as API (backend Dockerfile); overrides entrypoint to run SQS consumer.
          image: 164083713732.dkr.ecr.us-west-1.amazonaws.com/study-platform-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: database-url
                  optional: true
          command: ["python", "manage.py", "run_submission_worker"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
