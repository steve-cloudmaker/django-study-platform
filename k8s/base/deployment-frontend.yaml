apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: 164083713732.dkr.ecr.us-west-1.amazonaws.com/study-platform-frontend@sha256:37b9cf6fa9fa471f07e630f45544a2baee178b5478c93ca21c20fb75104571e8
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_BASE_URL
              value: "https://api.charliesystems.ai"
            - name: API_HEALTH_BASE_URL
              value: "http://api.default.svc.cluster.local"
            - name: GRAFANA_URL
              value: "https://grafana.charliesystems.ai"
            - name: GRAFANA_DASHBOARD_URL
              value: "https://grafana.charliesystems.ai/d/study-platform-api/study-platform-e28094-django-api?orgId=1&from=now-6h&to=now&timezone=browser&refresh=30s"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
