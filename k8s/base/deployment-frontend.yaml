apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: 164083713732.dkr.ecr.us-west-1.amazonaws.com/study-platform-frontend@sha256:625c9f1e8ceea0fa45591f6049121bba68533efd239d9786aaba44afd24ec0c9
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_BASE_URL
              value: "http://study-platform-api-26449474.us-west-1.elb.amazonaws.com"
            - name: GRAFANA_URL
              value: "http://study-platform-grafana-1208606315.us-west-1.elb.amazonaws.com"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
