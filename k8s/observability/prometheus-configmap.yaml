apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: study-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      # Django API Service (namespace default, ClusterIP port 80 -> container 8000)
      - job_name: django-api
        metrics_path: /metrics
        scrape_interval: 15s
        static_configs:
          - targets: ["api.default.svc.cluster.local:80"]

      - job_name: kube-state-metrics
        metrics_path: /metrics
        scrape_interval: 15s
        static_configs:
          - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]

      # Uncomment when the worker exposes django-prometheus /metrics on a Service port.
      # - job_name: django-worker
      #   metrics_path: /metrics
      #   static_configs:
      #     - targets: ["worker.default.svc.cluster.local:8001"]
