# Annotate with IRSA after Terraform apply:
#   kubectl annotate serviceaccount -n monitoring grafana \
#     eks.amazonaws.com/role-arn="$(cd infra/environments/dev && terraform output -raw grafana_role_arn)" --overwrite
#   kubectl rollout restart deployment/grafana -n monitoring
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: study-platform
