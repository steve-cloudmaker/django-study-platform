apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: study-platform
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
      - name: CloudWatch
        type: cloudwatch
        uid: cloudwatch
        access: proxy
        isDefault: false
        editable: false
        jsonData:
          authType: default
          defaultRegion: us-west-1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: study-platform
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: study-platform
        orgId: 1
        folder: Study Platform
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
