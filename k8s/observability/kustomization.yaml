# Prometheus + Grafana (dashboard provisioned from dashboards/study-platform-api.json).
#
# Apply:
#   kubectl apply -k k8s/observability
#
# Port-forward UI:
#   kubectl -n monitoring port-forward svc/grafana 3000:3000
#   kubectl -n monitoring port-forward svc/prometheus 9090:9090
#
# Defaults: Grafana admin / password from Secret grafana-admin (change `changeme`).
# Prometheus scrapes the Django API at api.default.svc.cluster.local:80/metrics (job=django-api),
# and kube-state-metrics in this namespace for Deployment or HPA series (job=kube-state-metrics).
# Grafana CloudWatch datasource uses IRSA: annotate ServiceAccount grafana (see grafana-serviceaccount.yaml).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-files
    files:
      - dashboards/study-platform-api.json

resources:
  - namespace.yaml
  - kube-state-metrics-rbac.yaml
  - kube-state-metrics.yaml
  - prometheus-configmap.yaml
  - prometheus.yaml
  - grafana-configmaps.yaml
  - grafana-secret.yaml
  - grafana-serviceaccount.yaml
  - grafana.yaml
  - grafana-ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
